<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel= "stylesheet" type= "text/css" href= "{{ url_for('static',filename='edit.css') }}">
    <title>BME Inventory Search</title>
</head>

<body>
    <nav class="navbar">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">BME Inventory</a>
            <div class="ms-auto">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Search</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/floorplan">Floorplan</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/db" data-protected-link data-authenticated="{{ 'true' if database_authenticated else 'false' }}" data-auth-url="{{ url_for('database_auth') }}">Database <span aria-hidden="true">🔒</span></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-editor d-flex">
        <!-- Left Section: Item Entry -->
        <div class="editor">
            <form id="edit-form">
                <h1>Item Entry</h1>
                <div class="selector">
                    <select name="rooms" id="rooms">
                        <option value="">--Select Room--</option>
                        <option value="110">110 Main</option>
                        <option value="110A">110-A</option>
                        <option value="110B">110-B</option>
                        <option value="110C">110-C</option>
                    </select>
                    <select name="walls" id="walls">
                        <option value="">--Select Wall--</option>
                        <option value="North">North</option>
                        <option value="South">South</option>
                        <option value="East">East</option>
                        <option value="West">West</option>
                    </select>
                </div>
                <div class="form-group">
                    <div class="row g-2">
                        <div class="col">
                            <label for="bin-type">Storage Type:</label>
                            <select name="bin-type" id="bin-type" class="form-select">
                                <option value="">--Storage Type--</option>
                                <option value="Bin">Bin</option>
                                <option value="Shelf">Shelf</option>
                                <option value="Drawer">Drawer</option>
                                <option value="Cabinet">Cabinet</option>
                                <option value="Tabletop">Tabletop</option>
                                <option value="Overhead">Overhead</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="col">
                            <label for="bin">Bin Number:</label>
                            <select name="bin" id="bin" class="form-select" disabled>
                                <option value="">--Select Bin--</option>
                                <option value="CREATE">Create New Bin</option>
                            </select>
                        </div>
                    </div>
                    
                        <div class="row g-2 mt-3">
                            <div class="col">
                                <label for="item_name">Item Name:</label>
                                <input 
                                    type="text" 
                                    id="item_name" 
                                    class="form-control" 
                                    name="item_name" 
                                    placeholder="Search or create an item..." 
                                    autocomplete="off">
                                <div class="dropdown-results" id="dropdown-results"></div>
                            </div>
                            <div class="col">
                                <label for="quantity">Quantity:</label>
                                <input 
                                    type="number" 
                                    id="quantity" 
                                    class="form-control" 
                                    name="quantity" 
                                    placeholder="Item Quantity" 
                                    min="0" 
                                    required>
                            </div>
                        </div>
                </div>
            </form>
            <button class="btn btn-primary mt-3" onclick="submitForm()">Add Item</button>
        </div>
    
        <!-- Right Section: Bin and Item Details -->
        <div class="details-container">
            <!-- Bin Information Box -->
            <div class="details-box" id="bin-details">
                <h2>Selected Bin</h2>
                <p><strong>Items in Bin:</strong></p>
                <ul>
                    <!-- Populate dynamically -->
                    <li>Item A</li>
                    <li>Item B</li>
                    <li>Item C</li>
                </ul>
            </div>
            <!-- Item Information Box -->
            <div class="details-box" id="item-details">
                <h2>Selected Item</h2>
                <p><strong>Total Quantity:</strong> 20</p>
                <p><strong>Other Locations:</strong></p>
                <ul>
                    <!-- Populate dynamically -->
                    <li>Room 110A</li>
                    <li>Room 110B</li>
                </ul>
                <p><strong>Date Created:</strong> 01/10/2025</p>
            </div>
        </div>
    </div>

  <script src="{{url_for('static', filename='edit.js')}}"></script>
  <script>
    (() => {
        document.querySelectorAll('[data-protected-link]').forEach((link) => {
            link.addEventListener('click', async (event) => {
                if (link.dataset.authenticated === 'true') return;
                event.preventDefault();
                const password = window.prompt('Enter editor password:');
                if (password === null) return;
                const response = await fetch(link.dataset.authUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                if (!response.ok) {
                    window.alert('Incorrect password.');
                    return;
                }
                const result = await response.json();
                window.location.href = result.redirect;
            });
        });
    })();
  </script>
</body>
</html>
